version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-social-automation
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Core n8n settings
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_URL:-http://localhost:5678}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}

      # Timezone — critical for 9AM IST scheduling
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata

      # Execution settings
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_DATA_MAX_AGE=72
      - EXECUTIONS_DATA_PRUNE=true
      - N8N_LOG_LEVEL=info
      - N8N_LOG_OUTPUT=console

      # Environment variables passed to workflows
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - TRACKER_SHEET_ID=${TRACKER_SHEET_ID}
      - INSTAGRAM_ACCOUNT_ID=${INSTAGRAM_ACCOUNT_ID}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - WHATSAPP_PHONE=${WHATSAPP_PHONE}
      - CALLMEBOT_API_KEY=${CALLMEBOT_API_KEY}
      - N8N_URL=${N8N_URL:-http://localhost:5678}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/.n8n/import:ro

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  n8n_data:
    driver: local
